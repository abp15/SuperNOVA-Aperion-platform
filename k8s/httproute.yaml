apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: platform-routes
  namespace: default
spec:
  parentRefs:
  - name: supernova-universal-gateway
    namespace: kong
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /ingest
    backendRefs:
    - name: ingestor
      port: 80
