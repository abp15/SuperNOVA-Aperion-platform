apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: supernova-universal-gateway
  namespace: kong
spec:
  # Swap 'kong' for the GKE managed class we verified earlier
  gatewayClassName: gke-l7-global-external-managed 
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: All
