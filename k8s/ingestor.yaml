apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestor
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestor
  template:
    metadata:
      labels:
        app: ingestor
    spec:
      containers:
      - name: ingestor
        # Your Artifact Registry path
        image: us-central1-docker.pkg.dev/supernova-aperion-platform/supernova-repo/ingestor:latest
        ports:
        - containerPort: 8000
        # GKE Gateway needs a readiness probe to mark the "upstream" as healthy
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ingestor
  namespace: default
spec:
  selector:
    app: ingestor
  ports:
  - port: 80
    targetPort: 8000
