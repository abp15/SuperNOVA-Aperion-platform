apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-service
  labels:
    app: memory-service
spec:
  replicas: 2
  selector:
    match_labels:
      app: memory-service
  template:
    metadata:
      labels:
        app: memory-service
    spec:
      serviceAccountName: supernova-ksa  # Ensure this KSA is created in the cluster
      containers:
      - name: memory-service-container  # Aligned with deploy.yml for automation
        image: us-central1-docker.pkg.dev/supernova-aperion-platform/supernova-repo/memory-service:latest
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_HOST
          value: "10.127.0.3" # Injected from your Terraform output
---
apiVersion: v1
kind: Service
metadata:
  name: memory-service
spec:
  selector:
    app: memory-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
