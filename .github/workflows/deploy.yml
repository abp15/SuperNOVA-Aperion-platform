name: Build and Deploy Memory Service

on:
  push:
    branches: [ main ]
    paths:
      - 'services/cognitive/memory-service/**'

env:
  PROJECT_ID: supernova-aperion-platform
  GAR_LOCATION: us-central1 
  GKE_CLUSTER: supernova-cluster
  GKE_ZONE: us-central1
  REPOSITORY: supernova-repo
  SERVICE_NAME: memory-service
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: 'projects/990931732148/locations/global/workloadIdentityPools/supernova-pool/providers/github-provider'
        service_account: 'supernova-gke-sa@supernova-aperion-platform.iam.gserviceaccount.com'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker
      run: gcloud auth configure-docker us-central1-docker.pkg.dev

    - name: Build and Push Docker Image
      run: |
        docker build -t $GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$SERVICE_NAME:${{ github.sha }} ./services/cognitive/memory-service
        docker push $GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$SERVICE_NAME:${{ github.sha }}

    # --- NEW DEPLOYMENT STEPS ---
    - name: Get GKE Credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: ${{ env.GKE_CLUSTER }}
        location: ${{ env.GKE_ZONE }}

    - name: Deploy to GKE
      run: |
        # 1. Dynamically replace the generic 'latest' tag with your specific Git SHA
        sed -i "s|image: .*|image: $GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$SERVICE_NAME:${{ github.sha }}|g" k8s/memory-service.yaml
        
        # 2. Apply the file. This creates the deployment if it's missing, or updates it if it exists.
        kubectl apply -f k8s/memory-service.yaml
        
        # 3. Wait for the new pods to spin up securely
        kubectl rollout status deployment/memory-service
